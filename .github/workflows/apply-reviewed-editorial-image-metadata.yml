name: Apply Reviewed Editorial Image Metadata

on:
  workflow_dispatch:
    inputs:
      decisions_file:
        description: Reviewed decisions JSON committed in the repository
        required: true
        default: data/editorial-image-metadata/review-decisions.example.json
      apply_changes:
        description: Apply changes to Sanity (false performs a dry run)
        required: true
        type: boolean
        default: false

jobs:
  apply-reviewed-metadata:
    name: Validate and optionally apply reviewed metadata
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NEXT_PUBLIC_SANITY_PROJECT_ID: hvg4b508
      NEXT_PUBLIC_SANITY_DATASET: production
      NEXT_PUBLIC_SANITY_API_VERSION: 2025-01-01
      SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}
      EDITORIAL_METADATA_DECISIONS_FILE: ${{ inputs.decisions_file }}
      EDITORIAL_METADATA_APPLY: ${{ inputs.apply_changes }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Validate and apply reviewed metadata
        run: npm run media:apply-reviewed-metadata

      - name: Upload apply report
        uses: actions/upload-artifact@v4
        with:
          name: editorial-image-metadata-apply
          path: artifacts/editorial-image-metadata-apply/
          retention-days: 30
