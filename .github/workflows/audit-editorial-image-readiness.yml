name: Audit Editorial Image Readiness

on:
  workflow_dispatch:

jobs:
  audit-editorial-images:
    name: Audit editorial image publication readiness
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      NEXT_PUBLIC_SANITY_PROJECT_ID: hvg4b508
      NEXT_PUBLIC_SANITY_DATASET: production
      NEXT_PUBLIC_SANITY_API_VERSION: 2025-01-01
      SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}
      EDITORIAL_IMAGE_AUDIT_OUTPUT_DIR: artifacts/editorial-image-audit

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run editorial image readiness audit
        run: npm run media:audit-readiness

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: editorial-image-readiness-audit
          path: artifacts/editorial-image-audit
          if-no-files-found: error
          retention-days: 30
