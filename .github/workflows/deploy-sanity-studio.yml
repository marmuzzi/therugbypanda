name: Deploy Sanity Studio

on:
  workflow_dispatch:

jobs:
  deploy-studio:
    runs-on: ubuntu-latest

    env:
      SANITY_AUTH_TOKEN: ${{ secrets.SANITY_AUTH_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install

      - name: Ensure Studio peer dependencies
        run: npm install styled-components@latest --no-save

      - name: Verify Studio dependencies
        run: npm list styled-components sanity

      - name: Deploy Sanity Studio
        run: npx sanity deploy --url therugbypanda --yes
