name: Generate Editorial Image Metadata Suggestions

on:
  workflow_dispatch:

jobs:
  generate-suggestions:
    name: Generate reviewable metadata suggestions
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      NEXT_PUBLIC_SANITY_PROJECT_ID: hvg4b508
      NEXT_PUBLIC_SANITY_DATASET: production
      NEXT_PUBLIC_SANITY_API_VERSION: 2025-01-01
      SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Generate metadata suggestions
        run: npm run media:generate-metadata-suggestions

      - name: Upload metadata suggestions
        uses: actions/upload-artifact@v4
        with:
          name: editorial-image-metadata-suggestions
          path: artifacts/editorial-image-metadata-suggestions/
          retention-days: 30
