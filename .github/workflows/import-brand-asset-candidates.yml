name: Import Brand Asset Candidates

on:
  workflow_dispatch:
    inputs:
      candidates_file:
        description: Candidate JSON file to import
        required: true
        default: data/brand-assets/candidate-collection-2026-07-05.json

jobs:
  import-brand-assets:
    name: Import unapproved brand asset candidates
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      NEXT_PUBLIC_SANITY_PROJECT_ID: hvg4b508
      NEXT_PUBLIC_SANITY_DATASET: production
      NEXT_PUBLIC_SANITY_API_VERSION: 2025-01-01
      SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}
      BRAND_ASSET_CANDIDATES_FILE: ${{ inputs.candidates_file }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Import brand asset candidates
        run: npm run brand-assets:import-candidates
