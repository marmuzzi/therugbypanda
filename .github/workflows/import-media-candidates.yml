name: Import Media Candidates

on:
  workflow_dispatch:
    inputs:
      source_branch:
        description: Branch containing the media import script and candidate file
        required: true
        default: feature/media-acquisition-pipeline
      candidate_file:
        description: Candidate JSON file path
        required: true
        default: data/media/apify-candidates-2026-07-04-evergreen-ranked.json

jobs:
  import-media-candidates:
    name: Import media candidate records
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      NEXT_PUBLIC_SANITY_PROJECT_ID: hvg4b508
      NEXT_PUBLIC_SANITY_DATASET: production
      NEXT_PUBLIC_SANITY_API_VERSION: 2025-01-01
      SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}

    steps:
      - name: Checkout selected branch
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.source_branch }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Import media candidates
        run: npm run media:import-candidates -- "${{ inputs.candidate_file }}"
